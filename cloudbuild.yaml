# BANCO API — Cloud Build entry point at repository root.
# Matches Google Console "Dockerfile location: Dockerfile" (repo root).
# Build + push only — no Cloud Run deploy. See deploy/gcp/cloudbuild.deploy.yaml to deploy.
#
# Trigger settings:
#   Configuration file: cloudbuild.yaml (this file)
#   Build context / directory: .  (repository root)

substitutions:
  _REGION: europe-west1
  _AR_REPO: banco
  _IMAGE_NAME: api

steps:
  - name: gcr.io/cloud-builders/docker
    id: build-api
    args:
      - build
      - -f
      - Dockerfile
      - --build-arg
      - GIT_SHA=$COMMIT_SHA
      - --build-arg
      - BUILD_ID=$BUILD_ID
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_IMAGE_NAME}:$BUILD_ID
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_IMAGE_NAME}:latest
      - .

  - name: gcr.io/cloud-builders/docker
    id: push-api
    args:
      - push
      - --all-tags
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_IMAGE_NAME}

images:
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_IMAGE_NAME}:$BUILD_ID
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_IMAGE_NAME}:latest

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8

timeout: 1800s
