    get:
      operationId: getEmailConfig
      summary: Read the masked email-provider (Resend) configuration
      description: >
        Returns the admin view of the transactional-email provider config. The
        API key is never returned — only whether one is stored and which
        transport is currently active (real Resend delivery vs honest log-only).
      tags: [admin]
      security:
        - ClerkAuth: []
      responses:
        "200":
          description: Email provider config
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/EmailConfigView"
                  error:
                    $ref: "#/components/schemas/ApiError"
                    nullable: true
    put:
      operationId: updateEmailConfig
      summary: Create or update the email-provider configuration
      description: >
        Upserts the Resend config. The API key is write-only — omit or send an
        empty string to keep the stored value. Non-secret fields are applied
        when present (empty string clears an optional field).
      tags: [admin]
      security:
        - ClerkAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EmailConfigUpdate"
      responses:
        "200":
          description: Updated email provider config
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/EmailConfigView"
                  error:
                    $ref: "#/components/schemas/ApiError"
                    nullable: true

  /v1/admin/email-config/test:
    post:
      operationId: testEmailConfig
      summary: Validate the saved email-provider key
      description: >
        Validates the stored Resend API key against the provider (ignores the
        enabled flag). With no key configured it reports the honest log-only
        state rather than failing. No email is sent.
      tags: [admin]
      security:
        - ClerkAuth: []
      responses:
        "200":
          description: Email connection test result
