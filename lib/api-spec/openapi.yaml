                    nullable: true
    put:
      operationId: updatePromoCampaign
      summary: Create or update the promo ad-credit campaign
      description: >
        Upserts the campaign config. Changing amounts/duration affects only
        FUTURE monthly grants; it does not reset balances or bump the version.
      tags: [admin]
      security:
        - ClerkAuth: []
      requestBody:
        required: true
