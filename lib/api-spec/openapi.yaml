                    $ref: "#/components/schemas/PaymentConfigView"
                  error:
                    $ref: "#/components/schemas/ApiError"
                    nullable: true

  /v1/admin/payment-config/test:
    post:
      operationId: testPaymentConfig
      summary: Test the saved payment-provider connection
      description: >
        Opens a throwaway intention against the gateway using the saved
        credentials (ignores the enabled flag) to validate them. No money moves.
      tags: [admin]
      security:
        - ClerkAuth: []
      responses:
        "200":
          description: Connection test result
          content:
            application/json:
              schema:
                type: object
                properties:
