openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 1.0.0
  description: BANCO Asset Marketplace API — Cars, Real Estate, Industrial
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: feed
    description: Adaptive feed
  - name: listings
    description: Listing management
  - name: search
    description: Search and discovery
  - name: leads
    description: Lead tracking and behavior signals
  - name: saves
    description: Saved listings
  - name: dealer
    description: Banco Market (B2B)
  - name: me
    description: Current authenticated user state

components:
  securitySchemes:
    ClerkAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    HealthStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [ok, degraded]

    ApiError:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
          enum: [INVALID_DATA, NOT_FOUND, UNAUTHORIZED, INTERNAL_ERROR, FORBIDDEN, RATE_LIMITED, INVALID_TOKEN, CONFLICT]
        message:
          type: string

    Meta:
      type: object
      properties:
        cursor:
          type: string
        has_next:
          type: boolean
        total:
          type: integer

    FacetCounts:
      type: object
      description: >-
        Per-value counts of the currently-visible inventory. Each map is keyed by
        the attribute value (e.g. fuel_type "diesel") with the count of matching
        active, publicly-visible listings. Maps only include values that have at
        least one listing, so clients can render facet chips directly. The
        category map is unscoped; all other maps respect the requested category.
      required:
        - total
        - category
        - condition
        - fuel_type
        - transmission
        - payment_plan
        - property_type
        - finishing_type
        - offer_type
        - industrial_type
        - industry
        - origin_type
        - compound
        - furnished
        - has_installment
      properties:
        total:
          type: integer
        category:
          type: object
          additionalProperties:
            type: integer
        condition:
          type: object
          additionalProperties:
            type: integer
        fuel_type:
          type: object
          additionalProperties:
            type: integer
        transmission:
          type: object
          additionalProperties:
            type: integer
        payment_plan:
          type: object
          additionalProperties:
            type: integer
        property_type:
          type: object
          additionalProperties:
            type: integer
        finishing_type:
          type: object
          additionalProperties:
            type: integer
        offer_type:
          type: object
          additionalProperties:
            type: integer
        industrial_type:
          type: object
          additionalProperties:
            type: integer
        industry:
          type: object
          additionalProperties:
            type: integer
        origin_type:
          type: object
          additionalProperties:
            type: integer
        compound:
          type: integer
        furnished:
          type: integer
        has_installment:
          type: integer

    UserState:
      type: object
      description: Authoritative current-user state. DB is the source of truth for role.
      required: [id, clerk_id, account_number, role, staff_role, name, is_verified, is_admin, wallet_balance, created_at]
      properties:
        id:
          type: string
        clerk_id:
          type: string
        account_number:
          type: string
          nullable: true
          description: Internal default account number, auto-assigned per user.
        role:
          type: string
          enum: [individual, dealer, company, enterprise, financial_institution]
        staff_role:
          type: string
          enum: [owner, admin, moderator, support, user]
          description: >
            Internal staff role, a separate axis from `role`. "user" means no
            staff access; the others grant Admin Control Center permissions.
        is_admin:
          type: boolean
          description: Whether this user has Admin Control Center access.
        name:
          type: string
        email:
          type: string
          nullable: true
        phone:
          type: string
          nullable: true
        is_verified:
          type: boolean
        wallet_balance:
          type: string
        created_at:
          type: string

    FeedItem:
      type: object
      description: >
        Immutable v1 contract — exactly 11 fields.
        No renames, no removals allowed in v1. Breaking changes go to /v2/*.
      required:
        - id
        - media_preview
        - price_display
        - title
        - location
        - trust_signal
        - has_video
        - is_sponsored
      properties:
        id:
          type: string
          description: Listing identifier (use for detail navigation).
        media_preview:
          type: string
        price_display:
          type: string
        installment_badge:
          type: string
          nullable: true
        title:
          type: string
        location:
          type: string
        urgency_signal:
          type: string
          nullable: true
        trust_signal:
          type: string
        smart_badge:
          type: string
          nullable: true
        has_video:
          type: boolean
        is_sponsored:
          type: boolean
        coordinates:
          $ref: "#/components/schemas/Coordinates"
          nullable: true
        best_offer_badge:
          type: string
          nullable: true
        industrial_type:
          type: string
          nullable: true
          description: Industrial sub-type (factory, warehouse, land, production_line, raw_material, machine) used for client-side category grouping. Null for non-industrial listings.
        origin_type:
          type: string
          nullable: true
          description: '"imported" when the listing is imported (else null) — drives the "مستورد / Imported" card badge on industrial + car listings.'
        category:
          type: string
          enum: [car, real_estate, industrial]
          nullable: true
          description: Additive. The listing's main section — lets clients adapt per-section UI (e.g. the save glyph) without re-deriving it.
        is_active:
          type: boolean
          nullable: true
          description: True when the listing status is "active" (publicly visible and promotable). Lets owner-facing surfaces built on FeedItem (e.g. the profile grid) gate the Promote control without fetching ListingDetail. Null when status is unknown.
        whatsapp_enabled:
          type: boolean
          nullable: true
          description: True when the seller opted this listing in to WhatsApp contact. Opt-in only (default false). Lets surfaces decide whether to surface a WhatsApp action. Null when unknown.
        created_at:
          type: string
          nullable: true
          description: Listing creation timestamp (ISO 8601). Owner-facing grids (profile, "my listings") render a "Listed <date>" caption. Null only when the source row lacks it; public feeds always carry it.
        is_request:
          type: boolean
          nullable: true
          description: True when this is a buyer "request/wanted" post (looking to buy) rather than a sale listing. Surfaces render a "طلب / Wanted" badge and the requests filter keys off it. Null when unknown.
        is_bookable:
          type: boolean
          nullable: true
          description: >-
            Additive. True when this listing is a furnished/daily rental (hotel
            model) that can be reserved from its detail. Lets the feed, search
            card, and map pin surface a "قابل للحجز / Bookable" affordance without
            fetching the detail. Null/false for everything else.

    Coordinates:
      type: object
      required: [lat, lng]
      properties:
        lat:
          type: number
        lng:
          type: number

    Offer:
      type: object
      description: >
        Display-ready financing offer. Intentionally has NO rate/APR field —
        Islamic offers must never carry or imply one. All money is pre-formatted
        server-side; the client never calculates.
      required:
        - id
        - financing_type
        - provider
        - provider_badge
        - monthly_display
        - duration_months
        - total_payable_display
        - is_best
      properties:
        id:
          type: string
        financing_type:
          type: string
          enum: [islamic, conventional]
        provider:
          type: string
          enum: [seller, bank, dealer, supplier]
        provider_badge:
          type: string
        monthly_display:
          type: string
        duration_months:
          type: integer
        down_payment_display:
          type: string
          nullable: true
        total_payable_display:
          type: string
        is_best:
          type: boolean

    MediaItem:
      type: object
      required: [id, type, url, is_thumbnail]
      properties:
        id:
          type: string
        type:
          type: string
          enum: [image, video]
        url:
          type: string
        thumbnail_url:
          type: string
          nullable: true
        is_thumbnail:
          type: boolean

    PaymentOption:
      type: object
      properties:
        mode:
          type: string
          enum: [cash, seller_installment, bank_finance]
        down_payment:
          type: string
          nullable: true
        monthly_payment:
          type: string
          nullable: true
        duration_months:
          type: integer
          nullable: true
        is_islamic_compliant:
          type: boolean

    PaymentSummary:
      type: object
      required: [has_installment, options]
      properties:
        has_installment:
          type: boolean
        options:
          type: array
          items:
            $ref: "#/components/schemas/PaymentOption"
        lowest_monthly:
          type: string
          nullable: true
        lowest_down_payment:
          type: string
          nullable: true
        badge:
          type: string
          nullable: true

    Seller:
      type: object
      required: [id, name, role, is_verified]
      properties:
        id:
          type: string
        name:
          type: string
        role:
          type: string
        is_verified:
          type: boolean
        phone:
          type: string
          nullable: true
        # Additive (Profiles 2.0): seller-published marketing links — public by
        # design; the phone stays behind the contact-token flow.
        social_links:
          type: array
          items:
            type: object
            required: [platform, value]
            properties:
              platform:
                type: string
              value:
                type: string

    ListingDetail:
      type: object
      required:
        - id
        - title
        - category
        - price_display
        - location
        - status
        - created_at
        - media
        - specs
        - payment
        - seller
        - interactions
        - is_saved
      properties:
        id:
          type: string
        title:
          type: string
        description:
          type: string
          nullable: true
        category:
          type: string
          enum: [car, real_estate, industrial]
        price_display:
          type: string
        price_cash:
          type: number
          nullable: true
          description: >-
            Additive. Raw numeric cash price. For furnished/daily rentals this is
            the per-night rate the booking widget multiplies by the night count
            for a pre-booking estimate; the server stays authoritative on the
            real total. Null when unknown.
        location:
          type: string
        status:
          type: string
          enum: [active, sold, archived]
        created_at:
          type: string
          format: date-time
        media:
          type: array
          items:
            $ref: "#/components/schemas/MediaItem"
        specs:
          type: object
          additionalProperties: true
        payment:
          $ref: "#/components/schemas/PaymentSummary"
        seller:
          $ref: "#/components/schemas/Seller"
        interactions:
          type: object
          properties:
            views:
              type: integer
            clicks:
              type: integer
        is_saved:
          type: boolean
        is_request:
          type: boolean
        coordinates:
          $ref: "#/components/schemas/Coordinates"
          nullable: true
        offers:
          type: array
          items:
            $ref: "#/components/schemas/Offer"
        best_offer:
          $ref: "#/components/schemas/Offer"
          nullable: true
        linked_listings:
          type: array
          description: >
            Additive (Task #33). Bidirectional supply-chain cross-links surfaced
            on the listing detail only. Optional — older clients may ignore it.
          items:
            $ref: "#/components/schemas/LinkedListing"
        logistics:
          allOf:
            - $ref: "#/components/schemas/Logistics"
          nullable: true
          description: >
            Additive (Task #40). Optional seller-provided logistics & delivery
            block; null when the seller provided none. Older clients may ignore it.
        contact_token:
          type: string
          nullable: true
          description: >
            Single-use UUID token minted server-side when an authenticated
            non-owner loads this listing. Required by POST /v1/leads/contact.
            Null for the listing owner and for unauthenticated viewers.
        whatsapp_enabled:
          type: boolean
          nullable: true
          description: >
            True when the seller opted this listing in to WhatsApp contact.
            Opt-in only (default false); clients gate the WhatsApp CTA on it.

    DealerListing:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        category:
          type: string
        price_display:
          type: string
        price_raw:
          type: string
        location:
          type: string
        status:
          type: string
        created_at:
          type: string
        views:
          type: integer
        clicks:
          type: integer
        leads:
          type: integer

    Lead:
      type: object
      properties:
        id:
          type: string
        listing_id:
          type: string
        listing_title:
          type: string
        action_type:
          type: string
          enum: [whatsapp, call, chat, finance_request]
        status:
          type: string
          enum: [new, contacted, closed]
        buyer_name:
          type: string
          nullable: true
        buyer_phone:
          type: string
          nullable: true
        created_at:
          type: string

    ConversationSummary:
      type: object
      required: [id, listing_id, counterparty_name, unread, viewer_role]
      properties:
        id:
          type: string
        listing_id:
          type: string
        listing_title:
          type: string
          nullable: true
        listing_thumb:
          type: string
          nullable: true
        counterparty_id:
          type: string
        counterparty_name:
          type: string
        last_message_text:
          type: string
          nullable: true
        last_message_at:
          type: string
          nullable: true
        unread:
          type: integer
        viewer_role:
          type: string
          enum: [buyer, seller]

    Message:
      type: object
      required: [id, conversation_id, sender_id, body, is_mine, created_at]
      properties:
        id:
          type: string
        conversation_id:
          type: string
        sender_id:
          type: string
        body:
          type: string
        is_mine:
          type: boolean
        created_at:
          type: string
        read_at:
          type: string
          nullable: true
        media_url:
          type: string
          nullable: true
        media_kind:
          type: string
          nullable: true
          description: Attachment kind — image | video | audio (voice note).
        reactions:
          type: object
          additionalProperties:
            type: integer
          description: Count of each emoji reaction on the message.
        my_reactions:
          type: array
          items:
            type: string
          description: Emojis the viewer has reacted with.
        reply_to:
          type: object
          nullable: true
          description: Preview of the message this one replies to.
          required: [id, body, sender_id]
          properties:
            id:
              type: string
            body:
              type: string
            sender_id:
              type: string
        listing_ref:
          type: object
          nullable: true
          description: A listing shared as a card inside the chat.
          required: [id]
          properties:
            id:
              type: string
            title:
              type: string
              nullable: true
            thumb:
              type: string
              nullable: true
            price:
              type: string
              nullable: true

    ReactionResult:
      type: object
      required: [reactions, my_reactions]
      properties:
        reactions:
          type: object
          additionalProperties:
            type: integer
        my_reactions:
          type: array
          items:
            type: string

    Notification:
      type: object
      required: [id, type, title, body, created_at]
      properties:
        id:
          type: string
        type:
          type: string
          enum: [message, lead, system, rfq, new_match, price_drop, comment, review, investment, global_supply, booking, payment_success, payment_failed, subscription_expiring]
        title:
          type: string
        body:
          type: string
        data:
          type: object
          additionalProperties: true
          nullable: true
        read_at:
          type: string
          nullable: true
        created_at:
          type: string

    Comment:
      type: object
      description: A listing Q&A entry — a question (parent_id null) or a reply (Task #39).
      required: [id, listing_id, parent_id, author_id, author_name, is_seller, body, created_at]
      properties:
        id:
          type: string
        listing_id:
          type: string
        parent_id:
          type: string
          nullable: true
        author_id:
          type: string
        author_name:
          type: string
        is_seller:
          type: boolean
          description: True when the author owns the listing (the seller's answer).
        body:
          type: string
        created_at:
          type: string

    CommentBody:
      type: object
      description: Payload to ask a question or reply on a listing (Task #39).
      required: [body]
      properties:
        body:
          type: string
        parent_id:
          type: string
          nullable: true
          description: Set to reply to an existing question; omit for a top-level question.

    CommentDeleteResult:
      type: object
      description: Result of deleting a comment (author or listing owner).
      required: [deleted]
      properties:
        deleted:
          type: boolean

    SellerReview:
      type: object
      description: A buyer's rating/review of a seller (Task #39).
      required: [id, seller_id, author_id, author_name, rating, body, created_at]
      properties:
        id:
          type: string
        seller_id:
          type: string
        author_id:
          type: string
        author_name:
          type: string
        rating:
          type: integer
          minimum: 1
          maximum: 5
        body:
          type: string
          nullable: true
        created_at:
          type: string

    ReviewSummary:
      type: object
      description: Aggregate rating for a seller (Task #39).
      required: [average, count]
      properties:
        average:
          type: number
          nullable: true
          description: Average rating (1 decimal), null when there are no reviews.
        count:
          type: integer

    ReviewsResponse:
      type: object
      description: A seller's reviews with aggregate + viewer-aware eligibility (Task #39).
      required: [items, summary, can_review, my_rating]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/SellerReview"
        summary:
          $ref: "#/components/schemas/ReviewSummary"
        can_review:
          type: boolean
          description: Whether the authenticated viewer may leave/update a review.
        my_rating:
          type: integer
          minimum: 1
          maximum: 5
          nullable: true
          description: The viewer's existing rating, if any (for prefill).

    ReviewBody:
      type: object
      description: Payload to create or update a seller review (Task #39).
      required: [rating]
      properties:
        rating:
          type: integer
          minimum: 1
          maximum: 5
        body:
          type: string
          nullable: true

    SocialLink:
      type: object
      description: Public seller/company social link shown on the profile (Task #38).
      required: [platform, value]
      properties:
        platform:
          type: string
          enum: [instagram, linkedin, website, whatsapp]
        value:
          type: string
          description: URL (website/linkedin/instagram) or phone (whatsapp), normalized server-side.

    NotificationPreference:
      type: object
      description: Per-category notification preference. Absence of a row = enabled (Task #38).
      required: [type, in_app, email]
      properties:
        type:
          type: string
          enum: [message, lead, system, rfq, new_match, price_drop, comment, review, investment, global_supply, booking, payment_success, payment_failed, subscription_expiring]
        in_app:
          type: boolean
        email:
          type: boolean

    SavedSearch:
      type: object
      description: A saved search with optional price-tracking + match alerts (Task #38).
      required: [id, name, alerts_enabled, created_at]
      properties:
        id:
          type: string
        name:
          type: string
        query:
          type: string
          nullable: true
        category:
          type: string
          enum: [car, real_estate, industrial]
          nullable: true
        filters:
          type: object
          additionalProperties: true
          nullable: true
        price_min:
          type: string
          nullable: true
        price_max:
          type: string
          nullable: true
        alerts_enabled:
          type: boolean
        created_at:
          type: string

    LinkedListing:
      type: object
      description: >
        Compact supply-chain cross-link surfaced on listing detail (Task #33).
      required:
        - id
        - title
        - price_display
        - thumbnail
        - category
        - industrial_type
        - relation
        - direction
        - supplier
      properties:
        id:
          type: string
        title:
          type: string
        price_display:
          type: string
        thumbnail:
          type: string
          nullable: true
        category:
          type: string
          enum: [car, real_estate, industrial]
        industrial_type:
          type: string
          nullable: true
        relation:
          type: string
          enum: [feeds_into, part_of, compatible_with]
        direction:
          type: string
          enum: [incoming, outgoing]
        supplier:
          type: object
          nullable: true
          required: [id, name, is_verified]
          properties:
            id:
              type: string
            name:
              type: string
            is_verified:
              type: boolean

    CompanyStats:
      type: object
      description: Public seller stats — safe to expose, no lead PII (Task #33).
      required:
        - active_listings
        - total_listings
        - member_since
        - years_active
        - response_rate
        - is_verified
      properties:
        active_listings:
          type: number
        total_listings:
          type: number
        member_since:
          type: string
        years_active:
          type: number
        response_rate:
          type: number
          nullable: true
        is_verified:
          type: boolean
          description: Real admin-set verification flag; never inferred client-side.
    AiAssistantMessage:
      type: object
      required: [role, content]
      properties:
        role:
          type: string
          enum: [user, assistant]
        content:
          type: string
    AiAssistantBody:
      type: object
      required: [message]
      properties:
        message:
          type: string
          description: The user's new message/question for the BANCO assistant.
        history:
          type: array
          description: Prior turns in this session (client-held, capped server-side). Optional.
          items:
            $ref: "#/components/schemas/AiAssistantMessage"
    AiAssistantAction:
      type: object
      description: >
        An actionable suggestion the assistant attaches to a reply so the client
        can deep-link the user to the right place. Every action is built
        server-side from REAL data (real listing ids, the user's real
        conversations, real search filters) — never fabricated by the model.
      required: [kind, label]
      properties:
        kind:
          type: string
          enum: [listing, search, conversation, navigate]
        label:
          type: string
          description: Display text for the tappable chip/card.
        listing_id:
          type: string
          nullable: true
          description: For kind=listing — navigate to /listing/{id}.
        price_display:
          type: string
          nullable: true
        thumbnail_url:
          type: string
          nullable: true
        location:
          type: string
          nullable: true
        query:
          type: string
          nullable: true
          description: For kind=search — the search text to run.
        category:
          type: string
          nullable: true
        max_price:
          type: number
          nullable: true
        has_installment:
          type: boolean
          nullable: true
        conversation_id:
          type: string
          nullable: true
          description: For kind=conversation — open /messages/{id}.
        screen:
          type: string
          nullable: true
          description: >
            For kind=navigate — a known in-app screen key the client maps to a
            route (home, search, saved, messages, my_listings, create_listing,
            wallet, profile, notifications).

    AiAssistantResponse:
      type: object
      required: [answer]
      properties:
        answer:
          type: string
          description: The assistant's reply, grounded only in real BANCO context.
        actions:
          type: array
          description: >
            Optional deep-link suggestions (real listings, a search, a
            conversation, or an app screen). Additive/back-compatible — older
            clients ignore it.
          items:
            $ref: "#/components/schemas/AiAssistantAction"

    CompanyTrade:
      type: object
      description: >
        Structured B2B trade block. Null on the profile when the seller has no
        company profile (e.g. an individual).
      required:
        - about
        - year_established
        - countries_import_from
        - countries_export_to
        - min_order_value
        - min_order_unit
        - monthly_capacity
        - lead_time_days
        - certifications
        - website_url
        - logo_url
        - cover_url
        - industry
        - hq_country
      properties:
        about:
          type: string
          nullable: true
        year_established:
