          nullable: true
        hq_country:
          type: string
          nullable: true
        logo_url:
          type: string
          nullable: true
        match_reason:
          type: string

    GlobalSupplyDetail:
      allOf:
        - $ref: "#/components/schemas/GlobalSupplyRequest"
        - type: object
          required: [responses, supplier_matches, viewer_is_buyer]
          properties:
            responses:
              type: array
              items:
                $ref: "#/components/schemas/GlobalSupplyResponse"
            supplier_matches:
              type: array
              items:
                $ref: "#/components/schemas/SupplierMatch"
            viewer_is_buyer:
              type: boolean

    MarketTrend:
      type: object
      description: >
        Additive (Task #40). A single market trend computed LIVE from real
        listings/interactions/leads. Low samples report direction "insufficient"
        and data_quality "insufficient" — figures are never fabricated.
      required:
        - segment
        - segment_label
        - metric
        - direction
        - change_pct
        - change_display
        - current_value_display
        - period_label
        - sample_size
        - data_quality
      properties:
        segment:
          type: string
        segment_label:
          type: string
        metric:
          type: string
          enum: [avg_price, listing_volume, demand, lead_volume]
        direction:
          type: string
          enum: [up, down, stable, insufficient]
        change_pct:
          type: number
          nullable: true
        change_display:
          type: string
        current_value_display:
          type: string
          nullable: true
        period_label:
          type: string
        sample_size:
          type: integer
        data_quality:
          type: string
          enum: [high, medium, low, insufficient]

    MarketTrendsResult:
      type: object
      description: >
        Additive (Task #40). LIVE market intelligence payload. period_label +
        generated_at carry provenance so the client renders figures honestly.
      required: [trends, period_label, generated_at]
      properties:
        trends:
          type: array
          items:
            $ref: "#/components/schemas/MarketTrend"
        period_label:
          type: string
        generated_at:
          type: string
          format: date-time

paths:
  /v1/reference/places:
    get:
      operationId: getPlaceSuggestions
      summary: Autocomplete suggestions from the geo/real-estate reference dataset
      description: >-
        Multilingual, typo-tolerant place suggestions (cities, districts,
        compounds, projects) for search / autocomplete. Matches Arabic or Latin
        partial names and tolerates typos; prefix + popularity rank first.
        Read-only reference data — creates nothing and touches no live table.
      tags: [reference]
      parameters:
        - in: query
          name: q
          required: true
          description: Query text (min 2 chars); Arabic or Latin, partial ok.
          schema: { type: string }
        - in: query
          name: country
          description: Optional ISO country code filter (e.g. EG).
          schema: { type: string }
        - in: query
          name: limit
          schema: { type: integer }
      responses:
        "200":
          description: Place suggestions
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/PlaceSuggestion"
                  error:
                    $ref: "#/components/schemas/ApiError"
                    nullable: true
                  meta:
                    $ref: "#/components/schemas/Meta"

  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /v1/me:
    get:
      operationId: getMe
      summary: Current authenticated user state (DB source of truth)
      tags: [me]
      security:
        - ClerkAuth: []
      responses:
        "200":
          description: User state
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/UserState"
                  error:
                    $ref: "#/components/schemas/ApiError"
                    nullable: true
                  meta:
                    $ref: "#/components/schemas/Meta"

    patch:
      operationId: updateMe
      summary: Update current user — phone and optional Banco Business upgrade
      tags: [me]
      security:
        - ClerkAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                account_type:
                  type: string
                  description: Account type chosen at onboarding. Server is authoritative for the resulting role (individual/dealer/company/financial_institution); a client can never request admin/enterprise. A financial_institution must still pass verification before its financing features unlock.
                  enum: [individual, dealer, company, financial_institution]
                phone:
                  type: string
                  nullable: true
                business:
                  type: object
                  description: When present, upgrades the account to a Banco Business (dealer) seller.
                  required: [activity_type, business_name, city]
                  properties:
                    activity_type:
                      type: string
                      enum: [car_dealer, real_estate_developer, factory, supplier, financial_institution]
                    business_name:
                      type: string
                    trade_name:
                      type: string
                      description: Optional trade/brand name (الاسم التجاري) shown publicly; falls back to business_name when omitted.
                    owner_name:
                      type: string
                      description: Optional name of the business owner / decision-maker, captured for verification.
                    city:
                      type: string
                    documents:
                      type: array
                      description: Optional verification document/photo URLs (already uploaded to object storage) submitted for admin review.
                      items:
                        type: string
                        format: uri
      responses:
        "200":
          description: Updated user state
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/UserState"
                  error:
                    $ref: "#/components/schemas/ApiError"
                    nullable: true
                  meta:
                    $ref: "#/components/schemas/Meta"

  /v1/feed:
    get:
      operationId: getFeed
      summary: Get adaptive scored feed
      tags: [feed]
      parameters:
        - in: query
          name: cursor
          schema:
            type: string
        - in: query
          name: limit
          schema:
            type: integer
            default: 20
        - in: query
          name: category
          schema:
            type: string
            enum: [car, real_estate, industrial]
        - in: query
          name: is_request
          description: >-
            Buyer request/wanted filter. Omit to include both sale listings and
            requests. true = only requests; false = only sale listings.
          schema:
            type: boolean
        - in: query
          name: industrial_type
          description: >-
            Industrial subtype filter (only meaningful with category=industrial).
            A single subtype or a comma-separated list (a whole group), e.g.
            "factory,warehouse,land". Valid subtypes: factory, warehouse, land,
            production_line, raw_material, machine.
          schema:
            type: string
        - in: query
          name: condition
          description: Filter by condition (cars). Real data via listing_attributes.condition or specs.
          schema:
            type: string
            enum: [new, used]
        - in: query
          name: payment_plan
          description: >-
            Payment engine filter. installment = any non-cash plan; bank =
            bank_finance; direct = seller_installment; islamic = sharia-compliant
            non-cash plan.
          schema:
            type: string
            enum: [installment, bank, direct, islamic]
        - in: query
          name: property_type
          description: Filter real-estate by property type (villa, apartment, penthouse, duplex, ...).
          schema:
            type: string
        - in: query
          name: finishing_type
          description: Filter real-estate by finishing level.
          schema:
            type: string
        - in: query
          name: compound
          description: Real-estate located inside a compound (specs.compound).
          schema:
            type: boolean
        - in: query
          name: furnished
          description: Furnished real-estate (specs.furnished).
          schema:
            type: boolean
        - in: query
          name: offer_type
          description: Real-estate offer type — sale (تمليك) or rent (إيجار), from specs.offer_type.
          schema:
            type: string
            enum: [sale, rent]
        - in: query
          name: rental_term
          description: >-
            Rental system within rent — the country's legal/duration regime
            (Egypt: furnished_daily from 1 day, new_law up to 5 years, old_law up
            to 59 years; Gulf: annual_contract). Free string; the catalog is
            client-side and grows per country.
          schema:
            type: string
        - in: query
          name: market_country
          description: >-
            ISO 3166-1 alpha-2 market country (EG, SA, …). Filters inventory by
            specs.market_country; listings without the key are treated as EG.
          schema:
            type: string
            pattern: "^[A-Za-z]{2}$"
        - in: query
          name: material
          description: >-
            Filter raw-material commodity listings by specs.material
            (steel, aluminum, copper, …). Free string; catalog is client-side.
          schema:
            type: string
            maxLength: 40
        - in: query
          name: fuel_type
          description: Filter cars by fuel type (listing_attributes.fuel_type or specs).
          schema:
            type: string
            enum: [petrol, diesel, hybrid, electric, natural_gas]
        - in: query
          name: transmission
          description: Filter cars by transmission (listing_attributes.transmission or specs).
          schema:
            type: string
            enum: [manual, automatic, cvt]
        - in: query
          name: brand
          description: >-
            Filter cars by brand, matched against the English listing title
            (titles are canonical "<Brand> <Model> <Year>").
          schema:
            type: string
        - in: query
          name: model
          description: Filter cars by model, matched against the English listing title.
          schema:
            type: string
        - in: query
          name: min_year
          description: Minimum car model year (numeric specs.year).
          schema:
            type: integer
        - in: query
          name: max_year
          description: Maximum car model year (numeric specs.year).
          schema:
            type: integer
        - in: query
          name: industry
          description: Filter industrial listings by industry (listing_attributes.industry).
          schema:
            type: string
            enum: [food, beverage, plastic, textile, pharmaceutical, chemical, engineering, other]
        - in: query
          name: origin_type
          description: Filter industrial listings by origin (listing_attributes.origin_type).
          schema:
            type: string
            enum: [local, imported]
        - in: query
          name: session_id
          schema:
            type: string
      responses:
        "200":
          description: Feed items with cursor pagination
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/FeedItem"
                  error:
                    $ref: "#/components/schemas/ApiError"
                    nullable: true
                  meta:
                    $ref: "#/components/schemas/Meta"

  /v1/uploads/request-url:
    post:
      operationId: requestUploadUrl
      summary: Request a presigned URL to upload listing media
      tags: [uploads]
      security:
        - ClerkAuth: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                filename:
                  type: string
                content_type:
                  type: string
                size:
                  type: integer
      responses:
        "200":
          description: Presigned upload URL and the public serving URL
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    required: [upload_url, object_path, url]
                    properties:
                      upload_url:
                        type: string
                      object_path:
                        type: string
                      url:
                        type: string
                  error:
                    $ref: "#/components/schemas/ApiError"
                    nullable: true
                  meta:
                    $ref: "#/components/schemas/Meta"

  /v1/uploads/promote:
    post:
      operationId: promoteUpload
      summary: Promote an uploaded image to public so it can be served without auth
      tags: [uploads]
      security:
        - ClerkAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [url]
              properties:
                url:
                  type: string
      responses:
        "200":
          description: The upload was promoted to public
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    required: [url, promoted]
                    properties:
                      url:
                        type: string
                      promoted:
                        type: boolean
                  error:
                    $ref: "#/components/schemas/ApiError"
                    nullable: true
                  meta:
                    $ref: "#/components/schemas/Meta"

  /v1/uploads/verify:
    post:
      operationId: verifyUpload
      summary: Confirm an uploaded asset landed in storage with a valid type and size
      tags: [uploads]
      security:
        - ClerkAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [url]
              properties:
                url:
                  type: string
      responses:
        "200":
          description: The upload exists in storage and is within type/size limits
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    required: [url, ok, type, content_type, size]
                    properties:
                      url:
                        type: string
                      ok:
                        type: boolean
                      type:
                        type: string
                        nullable: true
                        enum: [image, video]
                      content_type:
                        type: string
                        nullable: true
                      size:
                        type: integer
                        nullable: true
                  error:
                    $ref: "#/components/schemas/ApiError"
                    nullable: true
                  meta:
                    $ref: "#/components/schemas/Meta"

  /v1/listings:
    get:
      operationId: getListings
      summary: Browse public listings
      tags: [listings]
      parameters:
        - in: query
          name: cursor
          schema:
            type: string
        - in: query
          name: limit
          schema:
            type: integer
            default: 20
        - in: query
          name: category
          schema:
            type: string
            enum: [car, real_estate, industrial]
      responses:
        "200":
          description: Paginated listing feed
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/FeedItem"
                  error:
                    $ref: "#/components/schemas/ApiError"
                    nullable: true
                  meta:
                    $ref: "#/components/schemas/Meta"
    post:
      operationId: createListing
      summary: Create listing
      tags: [listings]
      security:
        - ClerkAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [title, category, location, specs, media]
              properties:
                title:
                  type: string
                description:
                  type: string
                category:
                  type: string
                  enum: [car, real_estate, industrial]
                base_price_cash:
                  type: number
                  description: Required for normal sale listings. Optional when is_request is true (a buyer request).
                is_request:
                  type: boolean
                  description: When true, this is a buyer "request/wanted" post. Price (base_price_cash) becomes optional and a description is required.
                location:
                  type: string
                latitude:
                  type: number
                  description: Optional precise pin (send with longitude). Overrides the area centroid for near-me search + map display.
                longitude:
                  type: number
                  description: Optional precise pin (send with latitude).
                specs:
                  type: object
                  additionalProperties: true
                media:
                  type: array
                  items:
                    type: object
                    properties:
                      type:
                        type: string
                        enum: [image, video]
                      url:
                        type: string
                      thumbnail_url:
                        type: string
                      is_thumbnail:
                        type: boolean
                payment_options:
                  type: array
                  items:
                    type: object
                    properties:
                      mode:
                        type: string
                        enum: [cash, seller_installment, bank_finance]
                      down_payment:
                        type: number
                      monthly_payment:
                        type: number
                      duration_months:
                        type: integer
                      is_islamic_compliant:
                        type: boolean
                      # P8/M8: declared murabaha/interest rate (0-100). Engine
                      # input only — public offers never expose it.
                      profit_rate_pct:
                        type: number
                logistics:
                  type: object
                  description: >
                    Additive (Task #40). Optional seller-provided logistics &
                    delivery block. All fields optional/nullable.
                  properties:
                    delivery_time_days:
                      type: integer
                      nullable: true
                    origin_type:
                      type: string
                      enum: [local, imported]
                      nullable: true
                    country_of_origin:
                      type: string
                      nullable: true
                    shipping_method:
                      type: string
                      enum: [container, bulk, air]
                      nullable: true
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      id:
                        type: string
                  error:
                    $ref: "#/components/schemas/ApiError"
                    nullable: true
                  meta:
                    $ref: "#/components/schemas/Meta"

  /v1/listings/{id}:
    get:
      operationId: getListing
      summary: Get listing detail
      description: >
        Returns full listing detail for active listings. Non-active listings
        (sold, archived) are only visible to their owner; all other callers
        receive 404, preventing access to withdrawn inventory and seller
        contact details.
      tags: [listings]
      security:
        - {}
        - ClerkAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Listing detail
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/ListingDetail"
                  error:
                    $ref: "#/components/schemas/ApiError"
                    nullable: true
                  meta:
                    $ref: "#/components/schemas/Meta"
        "404":
          description: Not found or listing is non-active and caller is not the owner
    patch:
      operationId: updateListing
      summary: Update own listing (partial)
      tags: [listings]
      security:
        - ClerkAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                description:
                  type: string
                base_price_cash:
                  type: number
                location:
                  type: string
                status:
                  type: string
                  enum: [active, sold, archived]
                  description: >
                    Lifecycle status. Sellers set "sold" to mark the deal closed
                    or "archived" to hide the listing.
                specs:
                  type: object
                  additionalProperties: true
                logistics:
                  type: object
                  description: >
                    Additive (Task #40). Optional logistics & delivery patch. All
                    fields optional/nullable.
                  properties:
                    delivery_time_days:
                      type: integer
                      nullable: true
                    origin_type:
                      type: string
                      enum: [local, imported]
                      nullable: true
                    country_of_origin:
                      type: string
                      nullable: true
                    shipping_method:
                      type: string
                      enum: [container, bulk, air]
                      nullable: true
                media:
                  type: array
                  description: >
                    Replace listing media in seller order. Omit to leave photos
                    unchanged. Sale listings must keep at least one item.
                  items:
                    type: object
                    required: [type, url]
                    properties:
                      type:
                        type: string
                        enum: [image, video]
                      url:
                        type: string
                        format: uri
                      thumbnail_url:
                        type: string
                        format: uri
                      is_thumbnail:
                        type: boolean
                      width:
                        type: integer
                      height:
                        type: integer
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      id:
                        type: string
                      updated:
                        type: boolean
                  error:
                    $ref: "#/components/schemas/ApiError"
                    nullable: true
                  meta:
                    $ref: "#/components/schemas/Meta"
        "404":
          description: Not found
    delete:
      operationId: deleteListing
      summary: Delete own listing
      tags: [listings]
      security:
        - ClerkAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      id:
                        type: string
                      deleted:
                        type: boolean
                  error:
                    $ref: "#/components/schemas/ApiError"
                    nullable: true
                  meta:
                    $ref: "#/components/schemas/Meta"
        "404":
          description: Not found

  /v1/listings/{id}/similar:
    get:
      operationId: getSimilarListings
      summary: Get similar listings
      tags: [listings]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Similar listings
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/FeedItem"
                  error:
                    $ref: "#/components/schemas/ApiError"
                    nullable: true
                  meta:
                    $ref: "#/components/schemas/Meta"

  /v1/listings/{id}/insights:
    get:
      operationId: getListingInsights
      summary: Market insights + deal rating for a listing
      description: >-
        How this listing's price compares to its own market segment (category +
        location + a per-category discriminator). Returns a deal rating, the
        segment's current statistics and a monthly price history. Ratings and
        figures appear only once the segment has enough REAL observations;
        otherwise rating is "insufficient_data" and the figures are null — nothing
        is fabricated.
      tags: [listings]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Deal insights
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/DealInsights"
                  error:
                    $ref: "#/components/schemas/ApiError"
                    nullable: true
                  meta:
                    $ref: "#/components/schemas/Meta"

  /v1/listings/{id}/availability:
    get:
      operationId: getListingAvailability
      summary: Booked date ranges for a furnished/daily rental
      description: >-
        The date ranges already reserved for a furnished/daily (hotel‑model)
        rental, so the client can grey them out on the calendar. Empty for
        non‑daily listings.
      tags: [listings]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Booked ranges
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/AvailabilityRange"
                  error:
                    $ref: "#/components/schemas/ApiError"
                    nullable: true
                  meta:
                    $ref: "#/components/schemas/Meta"

  /v1/listings/{id}/bookings:
    post:
      operationId: createBooking
      summary: Request a short‑stay booking (furnished/daily rental only)
      description: >-
        Reserve a furnished/daily real‑estate listing for a date range (hotel
        model). Allowed ONLY when the listing's rental_term is furnished_daily;
        long‑term rent and sale are not bookable. Prevents double‑booking. No
        payment yet — this is a request/hold.
      tags: [listings]
      security:
        - ClerkAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBookingBody"
      responses:
        "200":
          description: Booking created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/Booking"
                  error:
                    $ref: "#/components/schemas/ApiError"
                    nullable: true
                  meta:
                    $ref: "#/components/schemas/Meta"

  /v1/bookings:
    get:
      operationId: listBookings
      summary: My bookings — as guest or as host
      description: >-
        The signed-in user's short-stay bookings from one side. role=guest lists
        stays I requested; role=host lists incoming requests on listings I own.
        Each item carries the listing title/location and the counterparty name so
        the inbox renders directly. Newest first.
      tags: [bookings]
      security:
        - ClerkAuth: []
      parameters:
        - in: query
          name: role
          required: false
          schema:
            type: string
            enum: [guest, host]
            default: guest
      responses:
        "200":
          description: My bookings
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/BookingListItem"
                  error:
                    $ref: "#/components/schemas/ApiError"
                    nullable: true
                  meta:
                    $ref: "#/components/schemas/Meta"

  /v1/bookings/{id}:
    patch:
      operationId: updateBooking
      summary: Confirm / reject / cancel a booking
      description: >-
        Drive a booking through its lifecycle with role separation. The host
        (listing owner) may confirm or reject a requested booking; the guest may
        cancel their own requested/confirmed booking. Rejecting/cancelling frees
        the dates. No-op success when already in the target state.
      tags: [bookings]
      security:
        - ClerkAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateBookingBody"
      responses:
        "200":
          description: Updated booking
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/Booking"
                  error:
                    $ref: "#/components/schemas/ApiError"
                    nullable: true
                  meta:
                    $ref: "#/components/schemas/Meta"

  /v1/listings/{id}/bump:
    post:
      operationId: bumpListing
      summary: Recycle (renew) a listing to the top of recency feeds
      description: >
        Owner-only. Sets bumped_at to now so the listing sorts by
        COALESCE(bumped_at, created_at) in recency feeds and search. NEVER
        changes created_at — the true publish date is preserved. Rate-limited
        with a cooldown; only active, publicly visible listings can be recycled.
      tags: [listings]
      security:
        - ClerkAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Listing recycled
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      id:
                        type: string
                      bumped_at:
                        type: string
                        description: ISO 8601 timestamp the listing was recycled to.
                      next_bump_available_at:
                        type: string
                        description: ISO 8601 timestamp when the listing may be recycled again (cooldown end).
                  error:
                    $ref: "#/components/schemas/ApiError"
                    nullable: true
                  meta:
                    $ref: "#/components/schemas/Meta"
        "403":
          description: Caller is not the listing owner
        "404":
          description: Listing not found, or not eligible to recycle (inactive/hidden)
        "429":
          description: Cooldown has not elapsed (rate limited)

  /v1/search:
    get:
      operationId: searchListings
      summary: Full-text + filter search with Arabic NLP
      tags: [search]
      parameters:
        - in: query
          name: q
          description: Optional free-text query (Arabic NLP). Omit for filter-only section results.
          schema:
            type: string
        - in: query
          name: category
          schema:
            type: string
            enum: [car, real_estate, industrial]
        - in: query
          name: is_request
          description: >-
            Buyer request/wanted filter. Omit to include both sale listings and
            requests. true = only requests; false = only sale listings.
          schema:
            type: boolean
        - in: query
          name: min_price
          schema:
            type: number
        - in: query
          name: max_price
          schema:
            type: number
        - in: query
          name: location
          schema:
            type: string
        - in: query
          name: has_installment
          schema:
            type: boolean
        - in: query
          name: industrial_type
          description: >-
            Industrial subtype filter (only meaningful with category=industrial).
            A single subtype or a comma-separated list (a whole group), e.g.
            "production_line,raw_material,machine".
          schema:
            type: string
        - in: query
          name: condition
          description: Filter by condition (cars). Real data via listing_attributes.condition or specs.
          schema:
            type: string
            enum: [new, used]
        - in: query
          name: payment_plan
          description: >-
            Payment engine filter. installment = any non-cash plan; bank =
            bank_finance; direct = seller_installment; islamic = sharia-compliant
            non-cash plan.
          schema:
            type: string
            enum: [installment, bank, direct, islamic]
        - in: query
          name: property_type
          description: Filter real-estate by property type (villa, apartment, penthouse, duplex, ...).
          schema:
            type: string
        - in: query
          name: finishing_type
          description: Filter real-estate by finishing level.
          schema:
            type: string
        - in: query
          name: compound
          description: Real-estate located inside a compound (specs.compound).
          schema:
            type: boolean
        - in: query
          name: furnished
          description: Furnished real-estate (specs.furnished).
          schema:
            type: boolean
        - in: query
          name: offer_type
          description: Real-estate offer type — sale (تمليك) or rent (إيجار), from specs.offer_type.
          schema:
            type: string
            enum: [sale, rent]
        - in: query
          name: rental_term
          description: >-
            Rental system within rent — the country's legal/duration regime
            (Egypt: furnished_daily from 1 day, new_law up to 5 years, old_law up
            to 59 years; Gulf: annual_contract). Free string; the catalog is
            client-side and grows per country.
          schema:
            type: string
        - in: query
          name: market_country
          description: >-
            ISO 3166-1 alpha-2 market country (EG, SA, …). Filters inventory by
            specs.market_country; listings without the key are treated as EG.
          schema:
            type: string
            pattern: "^[A-Za-z]{2}$"
        - in: query
          name: material
          description: >-
            Filter raw-material commodity listings by specs.material
            (steel, aluminum, copper, …). Free string; catalog is client-side.
          schema:
            type: string
            maxLength: 40
        - in: query
          name: fuel_type
          description: Filter cars by fuel type (listing_attributes.fuel_type or specs).
          schema:
            type: string
            enum: [petrol, diesel, hybrid, electric, natural_gas]
        - in: query
          name: transmission
          description: Filter cars by transmission (listing_attributes.transmission or specs).
          schema:
            type: string
            enum: [manual, automatic, cvt]
        - in: query
          name: brand
          description: >-
            Filter cars by brand, matched against the English listing title
            (titles are canonical "<Brand> <Model> <Year>").
          schema:
            type: string
        - in: query
          name: model
          description: Filter cars by model, matched against the English listing title.
          schema:
            type: string
        - in: query
          name: min_year
          description: Minimum car model year (numeric specs.year).
          schema:
            type: integer
        - in: query
          name: max_year
          description: Maximum car model year (numeric specs.year).
          schema:
            type: integer
        - in: query
          name: industry
          description: Filter industrial listings by industry (listing_attributes.industry).
          schema:
            type: string
            enum: [food, beverage, plastic, textile, pharmaceutical, chemical, engineering, other]
        - in: query
          name: origin_type
          description: Filter industrial listings by origin (listing_attributes.origin_type).
          schema:
            type: string
            enum: [local, imported]
        - in: query
          name: near_lat
          description: Near-me anchor latitude (requires near_lng and radius_km).
          schema:
            type: number
        - in: query
          name: near_lng
          description: Near-me anchor longitude (requires near_lat and radius_km).
          schema:
            type: number
        - in: query
          name: radius_km
          description: Search radius in kilometres from the near-me anchor.
          schema:
            type: number
            minimum: 0.1
            maximum: 500
        - in: query
          name: sort
          description: >-
            Result ordering. recommended (default) and newest use the created_at
            keyset cursor; price_asc, price_desc and popular switch to offset
            pagination (their cursor is an opaque numeric offset). popular ranks
            by lifetime interactions (views + clicks).
          schema:
            type: string
            enum: [recommended, newest, price_asc, price_desc, popular]
            default: recommended
        - in: query
          name: cursor
          schema:
            type: string
        - in: query
          name: limit
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: Search results
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/FeedItem"
                  error:
                    $ref: "#/components/schemas/ApiError"
                    nullable: true
                  meta:
                    $ref: "#/components/schemas/Meta"

  /v1/search/map:
    get:
      operationId: getMapClusters
      summary: Server-side clustered listing pins for a map viewport
      description: >-
        The SAME filters as /v1/search (so the map and list stay consistent),
        within a viewport bounding box, aggregated into a zoom-dependent grid.
        Returns one cluster per occupied cell (centroid + count); listing_id is set
        only when a cell holds exactly one listing (a tappable pin). offer_type=rent
        powers the Booking-style rental map for real-estate, land and factories.
      tags: [search]
      parameters:
        - in: query
          name: min_lat
          required: true
          schema: { type: number }
        - in: query
          name: max_lat
          required: true
          schema: { type: number }
        - in: query
          name: min_lng
          required: true
          schema: { type: number }
        - in: query
          name: max_lng
          required: true
          schema: { type: number }
        - in: query
          name: zoom
          required: true
          description: Map zoom level (0-22); sets the cluster grid granularity.
          schema: { type: number }
        - in: query
          name: q
          schema: { type: string }
        - in: query
          name: category
          schema: { type: string, enum: [car, real_estate, industrial] }
        - in: query
          name: is_request
          schema: { type: boolean }
        - in: query
          name: min_price
          schema: { type: number }
        - in: query
          name: max_price
          schema: { type: number }
        - in: query
          name: location
          schema: { type: string }
        - in: query
          name: has_installment
          schema: { type: boolean }
        - in: query
          name: industrial_type
          schema: { type: string }
        - in: query
          name: condition
          schema: { type: string, enum: [new, used] }
        - in: query
          name: payment_plan
          schema: { type: string, enum: [installment, bank, direct, islamic] }
        - in: query
          name: property_type
          schema: { type: string }
        - in: query
          name: finishing_type
          schema: { type: string }
        - in: query
          name: compound
          schema: { type: boolean }
        - in: query
          name: furnished
          schema: { type: boolean }
        - in: query
          name: offer_type
          description: sale (تمليك) or rent (إيجار).
          schema: { type: string, enum: [sale, rent] }
        - in: query
          name: rental_term
          description: Rental regime (furnished_daily / new_law / old_law / annual_contract).
          schema: { type: string }
        - in: query
          name: market_country
          description: ISO market country (EG, SA, …); missing specs coalesce to EG.
          schema: { type: string, pattern: "^[A-Za-z]{2}$" }
        - in: query
          name: material
          description: Commodity material filter (specs.material) — free string.
          schema: { type: string, maxLength: 40 }
        - in: query
          name: fuel_type
          schema: { type: string, enum: [petrol, diesel, hybrid, electric, natural_gas] }
        - in: query
          name: transmission
          schema: { type: string, enum: [manual, automatic, cvt] }
        - in: query
          name: brand
          schema: { type: string }
        - in: query
          name: model
          schema: { type: string }
        - in: query
          name: min_year
          schema: { type: integer }
        - in: query
          name: max_year
          schema: { type: integer }
        - in: query
          name: industry
          schema: { type: string, enum: [food, beverage, plastic, textile, pharmaceutical, chemical, engineering, other] }
        - in: query
          name: origin_type
          schema: { type: string, enum: [local, imported] }
        - in: query
          name: near_lat
          description: Near-me anchor latitude (requires near_lng and radius_km).
          schema: { type: number }
        - in: query
          name: near_lng
          description: Near-me anchor longitude (requires near_lat and radius_km).
          schema: { type: number }
        - in: query
          name: radius_km
          description: Search radius in kilometres from the near-me anchor.
          schema: { type: number, minimum: 0.1, maximum: 500 }
      responses:
        "200":
          description: Map clusters
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/MapCluster"
                  error:
                    $ref: "#/components/schemas/ApiError"
                    nullable: true
                  meta:
                    $ref: "#/components/schemas/Meta"

  /v1/search/facets:
    get:
      operationId: getFacets
      summary: Per-value counts of the currently-visible inventory
      description: >-
        Counts of active, publicly-visible listings grouped by each filterable
        attribute, optionally scoped to a category. Each count uses the same
        column/specs matching logic as the search filters, so a chip's badge
        count equals the size of the result set that chip produces. Clients gate
        filter chips on count > 0 to avoid offering filters that return nothing.
      tags: [search]
      parameters:
