  /v1/leads/contact:
    post:
      operationId: contactLead
      summary: Record a contact lead and reveal seller phone
      description: >
        Atomically validates the single-use contact_token minted by
        GET /v1/listings/:id, records the lead, and returns the seller's phone
        number. The token is bound to the authenticated caller and the listing;
        it expires after 30 minutes and can only be used once. Returns 403 if
        the token is missing, expired, already used, or bound to a different
        caller or listing.
      tags: [leads]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [listing_id, action_type, contact_token]
              properties:
                listing_id:
                  type: string
                action_type:
                  type: string
                  enum: [whatsapp, call, chat, finance_request]
                buyer_name:
                  type: string
                buyer_phone:
                  type: string
                contact_token:
                  type: string
                  format: uuid
                  description: Single-use token from GET /v1/listings/:id
      responses:
        "200":
          description: Lead recorded; seller phone returned
          content:
            application/json:
              schema:
                type: object
                required: [data, error, meta]
                properties:
                  data:
                    type: object
                    nullable: true
                    properties:
                      phone:
                        type: string
                        nullable: true
                  error:
                    $ref: "#/components/schemas/ApiError"
                    nullable: true
                  meta:
                    $ref: "#/components/schemas/Meta"
        "403":
          description: Invalid, expired, or already-used contact token

