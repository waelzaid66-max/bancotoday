                  data:
                    $ref: "#/components/schemas/PaymentConfigView"
                  error:
                    $ref: "#/components/schemas/ApiError"
                    nullable: true
    put:
      operationId: updatePaymentConfig
      summary: Create or update the payment-provider configuration
      description: >
        Upserts the PSP configuration. Secret fields are write-only: omit or send
        an empty string to keep the stored value. Returns the masked view.
      tags: [admin]
      security:
        - ClerkAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PaymentConfigUpdate"
