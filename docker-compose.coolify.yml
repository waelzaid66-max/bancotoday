# BANCO — Coolify Docker Compose resource (docker-compose.coolify.yml)
#
# This is the DEFINITIVE compose file for Coolify Docker Compose deployments on
# Hostinger VPS. Upload it to a Coolify "Docker Compose" resource.
#
# Quick start on Coolify:
#   1. Create a new project → New Resource → Docker Compose → Paste this file
#      (or point to repository with compose file path = docker-compose.coolify.yml)
#   2. Set all required environment variables in Coolify's env section
#      (see docs/DEPLOY_COOLIFY.md for the full list)
#   3. Click Deploy
#
# ─── Services ────────────────────────────────────────────────────────────────
#   postgres      Postgres 16, persistent volume, internal-only
#   api           Node.js API server  → port 8080
#   banco-web     Next.js consumer app → port 3000
#   banco-website Next.js marketing site → port 3001 (host) : 3000 (container)
#   web           Nginx + Vite SPAs    → port 80
#
# ─── Network ─────────────────────────────────────────────────────────────────
#   All services share `banco_net`. Inter-service DNS uses the service name
#   (e.g. `api` resolves to the API container from any other container).
#
# ─── Environment variables ───────────────────────────────────────────────────
#   Runtime secrets (CLERK_SECRET_KEY, SESSION_SECRET, etc.) are injected by
#   Coolify from its environment variable UI — never committed here.
#   Build-time NEXT_PUBLIC_* / VITE_* args are passed via `build.args` below.
#   See docs/DEPLOY_COOLIFY.md for the complete variable reference.
#
# ─── Migrations ──────────────────────────────────────────────────────────────
#   Database schema migrations are NOT run automatically on container start.
#   Run them manually via the API container shell or a dedicated one-off container.
#   See docs/DEPLOY_COOLIFY.md → "Database Migrations" section.
# ─────────────────────────────────────────────────────────────────────────────

name: banco

networks:
  banco_net:
    driver: bridge

volumes:
  banco_pgdata:
    driver: local

services:

  # ── Postgres 16 ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-banco}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-banco}
    volumes:
      - banco_pgdata:/var/lib/postgresql/data
    networks:
      - banco_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-banco}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    # Postgres is internal-only. Do NOT expose a host port in production.

  # ── API server ───────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: deploy/coolify/Dockerfile.api
      args:
        # Deploy pin baked into the image; also set at runtime below as fallback.
        GIT_SHA: ${GIT_SHA:-}
        BUILD_ID: ${BUILD_ID:-}
    image: banco-api:latest
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - banco_net
    ports:
      - "${API_HOST_PORT:-8080}:8080"
    environment:
      PORT: "8080"
      NODE_ENV: production
      # Deploy pin — appears on GET /api/readyz (and /api, /api/livez).
      GIT_SHA: ${GIT_SHA:-}
      BUILD_ID: ${BUILD_ID:-}
      # DATABASE_URL uses the `postgres` service name as hostname (Docker DNS).
      DATABASE_URL: postgresql://${POSTGRES_USER:-banco}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-banco}
      # Auth
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY:?CLERK_SECRET_KEY is required}
      CLERK_PUBLISHABLE_KEY: ${CLERK_PUBLISHABLE_KEY:-}
      # Security
      SESSION_SECRET: ${SESSION_SECRET:?SESSION_SECRET is required}
      PAYMENT_CONFIG_ENCRYPTION_KEY: ${PAYMENT_CONFIG_ENCRYPTION_KEY:?PAYMENT_CONFIG_ENCRYPTION_KEY is required}
      # CORS: list of allowed origins (comma-separated public URLs of all frontends).
      # Production live origins today include https://banco.today and https://banco.deals.
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-}
      PUBLIC_API_BASE_URL: ${PUBLIC_API_BASE_URL:-}
      PUBLIC_APP_URL: ${PUBLIC_APP_URL:-}
      ADMIN_EMAILS: ${ADMIN_EMAILS:-}
      # Integrations (optional — features degrade gracefully when unset)
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      EMAIL_FROM: ${EMAIL_FROM:-}
      PAYMOB_MODE: ${PAYMOB_MODE:-test}
      PAYMOB_API_BASE: ${PAYMOB_API_BASE:-}
      PAYMOB_PUBLIC_KEY: ${PAYMOB_PUBLIC_KEY:-}
      PAYMOB_SECRET_KEY: ${PAYMOB_SECRET_KEY:-}
      PAYMOB_HMAC_SECRET: ${PAYMOB_HMAC_SECRET:-}
      PAYMOB_INTEGRATION_IDS: ${PAYMOB_INTEGRATION_IDS:-}
      # Object storage (optional — required for media uploads)
      # Supported providers in code: `s3` | `replit` only. `gcs` is REJECTED.
      OBJECT_STORAGE_PROVIDER: ${OBJECT_STORAGE_PROVIDER:-}
      AWS_REGION: ${AWS_REGION:-}
      S3_BUCKET: ${S3_BUCKET:-}
      PUBLIC_OBJECT_SEARCH_PATHS: ${PUBLIC_OBJECT_SEARCH_PATHS:-}
      PRIVATE_OBJECT_DIR: ${PRIVATE_OBJECT_DIR:-}
      # Hostinger / Coolify has no instance IAM role — pass static keys when using s3.
      # On AWS ECS/EC2 these may be omitted (default provider chain / task role).
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      # Observability
      ERROR_ALERT_WEBHOOK: ${ERROR_ALERT_WEBHOOK:-}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      LOG_DIR: ${LOG_DIR:-}
      CRON_TIMEZONE: ${CRON_TIMEZONE:-Africa/Cairo}
    healthcheck:
      test: ["CMD", "node", "-e",
        "fetch('http://127.0.0.1:8080/api/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      start_period: 45s
      retries: 3

  # ── banco-web (Next.js consumer app) ────────────────────────────────────────
  banco-web:
    build:
      context: .
      dockerfile: deploy/coolify/Dockerfile.banco-web
      args:
        # NEXT_PUBLIC_API_URL = internal service URL for SSR rewrites.
        # The Next.js SSR runtime calls this directly; browsers use /api/* proxy.
        NEXT_PUBLIC_API_URL: http://api:8080
        # Public-facing URL of THIS app (used for canonical URLs, og:url etc.)
        NEXT_PUBLIC_SITE_URL: ${BANCO_WEB_URL:-http://localhost:3000}
        NEXT_PUBLIC_MARKET_URL: ${BANCO_WEB_MARKET_URL:-}
        NEXT_PUBLIC_ADMIN_URL: ${BANCO_WEB_ADMIN_URL:-}
        NEXT_PUBLIC_APP_ANDROID_URL: ${NEXT_PUBLIC_APP_ANDROID_URL:-}
        NEXT_PUBLIC_APP_IOS_URL: ${NEXT_PUBLIC_APP_IOS_URL:-}
        NEXT_PUBLIC_WEB_SEARCH_LIVE: ${NEXT_PUBLIC_WEB_SEARCH_LIVE:-false}
        NEXT_PUBLIC_WEB_SEARCH_MAP: ${NEXT_PUBLIC_WEB_SEARCH_MAP:-false}
        NEXT_PUBLIC_WEB_MARKET_COPY: ${NEXT_PUBLIC_WEB_MARKET_COPY:-false}
        NEXT_PUBLIC_SEARCH_ENABLED: ${NEXT_PUBLIC_SEARCH_ENABLED:-true}
        NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY:-}
        NEXT_PUBLIC_CLERK_PROXY_URL: ${NEXT_PUBLIC_CLERK_PROXY_URL:-}
        NEXT_PUBLIC_GOOGLE_MAPS_API_KEY: ${NEXT_PUBLIC_GOOGLE_MAPS_API_KEY:-}
    image: banco-web:latest
    restart: always
    depends_on:
      api:
        condition: service_healthy
    networks:
      - banco_net
    ports:
      - "${BANCO_WEB_HOST_PORT:-3000}:3000"
    environment:
      PORT: "3000"
      NODE_ENV: production
      # Runtime-only secrets for Clerk (server-side only, never in the browser bundle)
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY:-}
    healthcheck:
      test: ["CMD", "node", "-e",
        "fetch('http://127.0.0.1:3000/api/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      start_period: 60s
      retries: 3

  # ── banco-website (Next.js marketing website) ────────────────────────────────
  banco-website:
    build:
      context: .
      dockerfile: deploy/coolify/Dockerfile.banco-website
      args:
        NEXT_PUBLIC_API_URL: http://api:8080
        NEXT_PUBLIC_SITE_URL: ${BANCO_WEBSITE_URL:-http://localhost:3001}
        NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY:-}
        NEXT_PUBLIC_CLERK_PROXY_URL: ${NEXT_PUBLIC_CLERK_PROXY_URL:-}
    image: banco-website:latest
    restart: always
    depends_on:
      api:
        condition: service_healthy
    networks:
      - banco_net
    # Host port 3001 maps to container port 3000 to avoid conflict with banco-web.
    ports:
      - "${BANCO_WEBSITE_HOST_PORT:-3001}:3000"
    environment:
      PORT: "3000"
      NODE_ENV: production
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY:-}
    healthcheck:
      test: ["CMD", "node", "-e",
        "fetch('http://127.0.0.1:3000/api/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      start_period: 60s
      retries: 3

  # ── web: Vite SPAs via Nginx (landing, dealer-os, admin-os) ─────────────────
  web:
    build:
      context: .
      dockerfile: deploy/coolify/Dockerfile.web
      args:
        VITE_CLERK_PUBLISHABLE_KEY: ${VITE_CLERK_PUBLISHABLE_KEY:-}
        VITE_CLERK_PROXY_URL: ${VITE_CLERK_PROXY_URL:-}
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-}
        VITE_MARKET_URL: ${VITE_MARKET_URL:-}
        VITE_ADMIN_URL: ${VITE_ADMIN_URL:-}
        VITE_APP_ANDROID_URL: ${VITE_APP_ANDROID_URL:-}
        VITE_APP_IOS_URL: ${VITE_APP_IOS_URL:-}
    image: banco-web-static:latest
    restart: always
    depends_on:
      api:
        condition: service_healthy
    networks:
      - banco_net
    ports:
      - "${WEB_HOST_PORT:-80}:80"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/nginx-health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
