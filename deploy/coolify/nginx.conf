# BANCO Coolify — Nginx: serves Vite SPAs and reverse-proxies API + SEO routes.
#
# Path routing (single origin, Coolify Traefik in front):
#   /              → landing SPA   (artifacts/landing, BASE_PATH=/)
#   /dealer-os/    → dealer-os SPA (LIVE path on banco.today — keep forever)
#   /market/       → dealer-os SPA (Coolify alias — same app, second BASE_PATH build)
#   /admin-os/     → admin-os SPA  (LIVE path on banco.today — keep forever)
#   /admin/        → admin-os SPA  (Coolify alias — same app, second BASE_PATH build)
#   /api/          → api:8080
#   /l/            → api:8080     (public listing HTML — seoRoutes, NOT under /api)
#   /sitemap.xml   → api:8080
#   /robots.txt    → api:8080
#   /nginx-health  → 200 ok
#
# Dual paths are intentional: production DomainRouter and applinks still use
# /dealer-os/ and /admin-os/. Coolify docs historically used /market/ and /admin/.
# Serving BOTH avoids breaking live redirects when migrating to Coolify.
#
# Upstream `banco_api` = Docker Compose service `api` on `banco_net`.

upstream banco_api {
    server api:8080;
    keepalive 32;
}

gzip on;
gzip_comp_level 6;
gzip_min_length 1024;
gzip_proxied any;
gzip_vary on;
gzip_types
    text/plain text/css text/javascript application/javascript
    application/json application/xml image/svg+xml font/woff2;

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # 60 MB body limit (listing media uploads). Keep in sync with API guards.
    client_max_body_size 60m;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-XSS-Protection "0" always;

    location = /nginx-health { access_log off; return 200 "ok\n"; }

    # ---- API reverse proxy --------------------------------------------------
    location /api/ {
        proxy_pass         http://banco_api;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";
        proxy_read_timeout 60s;
        proxy_buffering    off;
    }

    # ---- SEO / short links (mounted on API root, NOT under /api) ------------
    # Restored from Coolify PR2 — PR3 dropped these and broke /l/:id on the SPA origin.
    location /l/ {
        proxy_pass         http://banco_api;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";
    }

    location = /sitemap.xml {
        proxy_pass         http://banco_api;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";
    }

    location = /robots.txt {
        proxy_pass         http://banco_api;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";
    }

    # ---- Hashed static assets: cache aggressively --------------------------
    location /assets/            { expires 1y; add_header Cache-Control "public, immutable"; try_files $uri =404; }
    location /admin/assets/      { expires 1y; add_header Cache-Control "public, immutable"; try_files $uri =404; }
    location /admin-os/assets/   { expires 1y; add_header Cache-Control "public, immutable"; try_files $uri =404; }
    location /market/assets/     { expires 1y; add_header Cache-Control "public, immutable"; try_files $uri =404; }
    location /dealer-os/assets/  { expires 1y; add_header Cache-Control "public, immutable"; try_files $uri =404; }

    # ---- admin SPA (live path + Coolify alias) -----------------------------
    location /admin-os/ {
        try_files $uri $uri/ /admin-os/index.html;
    }
    location /admin/ {
        try_files $uri $uri/ /admin/index.html;
    }

    # ---- market / dealer-os SPA (live path + Coolify alias) ----------------
    location /dealer-os/ {
        try_files $uri $uri/ /dealer-os/index.html;
    }
    location /market/ {
        try_files $uri $uri/ /market/index.html;
    }

    # ---- landing SPA (root /) -----------------------------------------------
    location / {
        try_files $uri $uri/ /index.html;
    }
}
