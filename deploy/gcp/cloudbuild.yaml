# Cloud Build → Artifact Registry (build + push ONLY — no Cloud Run deploy).
# Use this for first-time GCP validation. Context MUST be repository root (.).
#
# Console / gcloud:
#   gcloud builds submit . --config=deploy/gcp/cloudbuild.yaml \
#     --substitutions=_REGION=europe-west1,_AR_REPO=banco
#
# Why $BUILD_ID (not $SHORT_SHA): SHORT_SHA is empty on manual submit and some
# triggers → docker tag ends with ":" only → exit status 125.

substitutions:
  _REGION: europe-west1
  _AR_REPO: banco
  _IMAGE_NAME: api

steps:
  - name: gcr.io/cloud-builders/docker
    id: build-api
    args:
      - build
      - -f
      - deploy/gcp/Dockerfile.api
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_IMAGE_NAME}:$BUILD_ID
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_IMAGE_NAME}:latest
      - .

  - name: gcr.io/cloud-builders/docker
    id: push-api
    args:
      - push
      - --all-tags
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_IMAGE_NAME}

images:
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_IMAGE_NAME}:$BUILD_ID
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_IMAGE_NAME}:latest

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8

timeout: 1800s
