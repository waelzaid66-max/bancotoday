# BANCO — single-origin reverse proxy + static SPA host (AWS).
# landing → /   ·   market (dealer-os) → /market/   ·   admin (admin-os) → /admin/
# API → /api/  (proxied to the api container). One domain, path-routed.

# The API upstream. In docker-compose this resolves to the `api` service;
# override API_UPSTREAM at container start for other topologies.
upstream banco_api {
    server api:8080;
    keepalive 32;
}

# gzip for text assets (Vite already content-hashes files → safe long cache).
gzip on;
gzip_comp_level 6;
gzip_min_length 1024;
gzip_proxied any;
gzip_vary on;
gzip_types
    text/plain text/css text/javascript application/javascript
    application/json application/xml image/svg+xml font/woff2;

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Body limit sized for listing media uploads (video). Matches the API's own
    # guard; raise both together if the media policy changes.
    client_max_body_size 60m;

    # Security headers (defence in depth; the API sets its own via Helmet too).
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-XSS-Protection "0" always;

    # Nginx's own health (used by the container HEALTHCHECK + ALB target group).
    location = /nginx-health { access_log off; return 200 "ok\n"; }

    # ---- API reverse proxy --------------------------------------------------
    location /api/ {
        proxy_pass         http://banco_api;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";
        proxy_read_timeout 60s;
        # Never cache API responses at the edge.
        proxy_buffering    off;
    }

    # ---- hashed static assets: cache hard -----------------------------------
    location /assets/        { expires 1y; add_header Cache-Control "public, immutable"; try_files $uri =404; }
    location /admin/assets/  { expires 1y; add_header Cache-Control "public, immutable"; try_files $uri =404; }
    location /market/assets/ { expires 1y; add_header Cache-Control "public, immutable"; try_files $uri =404; }

    # ---- admin SPA ----------------------------------------------------------
    location /admin/ {
        try_files $uri $uri/ /admin/index.html;
    }

    # ---- market (dealer-os) SPA --------------------------------------------
    location /market/ {
        try_files $uri $uri/ /market/index.html;
    }

    # ---- landing SPA (root) -------------------------------------------------
    location / {
        try_files $uri $uri/ /index.html;
    }
}
