kind = "web"
previewPath = "/dealer-os/"
title = "BANCO Market"
version = "1.0.0"
id = "artifacts/dealer-os"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/dealer-os/" ]
localPort = 21539

[services.development]
run = "pnpm --filter @workspace/dealer-os run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/dealer-os", "run", "build" ]
publicDir = "artifacts/dealer-os/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21539"
BASE_PATH = "/dealer-os/"
